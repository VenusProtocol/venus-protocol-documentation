<svg width="1100" height="520" viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(52,211,153,0.8)"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(245,158,11,0.7)"/>
    </marker>
    <filter id="glow-pur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="550" y="20" font-size="11" fill="rgba(255,255,255,0.3)" font-family="sans-serif"
        text-anchor="middle" letter-spacing="2.5">FIXED RATE VAULTS — CONTRACT ARCHITECTURE</text>

  <!-- ══ TOP ROW: LiquidationAdapter | VaultController | NFT ══ -->

  <!-- LiquidationAdapter (left, closer to controller) -->
  <!-- center x=235, gap to controller left (365): 55px -->
  <g transform="translate(235,88)">
    <rect x="-75" y="-35" width="150" height="70" rx="10" fill="#071a10"
          stroke="#34d399" stroke-width="1.8" filter="url(#glow-green)"/>
    <text font-size="10" font-weight="700" fill="#34d399" text-anchor="middle" y="-9"
          font-family="sans-serif">Liquidation</text>
    <text font-size="10" font-weight="700" fill="#34d399" text-anchor="middle" y="5"
          font-family="sans-serif">Adapter</text>
    <line x1="-60" y1="15" x2="60" y2="15" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="7.5" fill="#34d399" text-anchor="middle" y="27"
          font-family="sans-serif" letter-spacing="1">UPGRADEABLE</text>
  </g>

  <!-- InstitutionalVaultController (center) -->
  <g transform="translate(550,88)">
    <rect x="-185" y="-41" width="370" height="82" rx="14" fill="#15103a"
          stroke="#818cf8" stroke-width="2" filter="url(#glow-pur)"/>
    <text font-size="13" font-weight="700" fill="#818cf8" text-anchor="middle" y="-14"
          font-family="sans-serif">InstitutionalVaultController</text>
    <line x1="-150" y1="0" x2="150" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="9.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" y="16"
          font-family="sans-serif">governance surface · vault configuration · admin call proxy</text>
    <text font-size="8.5" fill="#818cf8" text-anchor="middle" y="31"
          font-family="sans-serif" letter-spacing="1">UPGRADEABLE · transparent proxy</text>
  </g>

  <!-- InstitutionPositionToken (right, closer to controller) -->
  <!-- center x=865, gap from controller right (735): 55px -->
  <g transform="translate(865,88)">
    <rect x="-75" y="-35" width="150" height="70" rx="10" fill="#1c1200"
          stroke="#f59e0b" stroke-width="1.8" filter="url(#glow-gold)"/>
    <text font-size="9" font-weight="700" fill="#f59e0b" text-anchor="middle" y="-11"
          font-family="sans-serif">Institution</text>
    <text font-size="9" font-weight="700" fill="#f59e0b" text-anchor="middle" y="3"
          font-family="sans-serif">PositionToken</text>
    <line x1="-60" y1="13" x2="60" y2="13" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="7.5" fill="#f59e0b" text-anchor="middle" y="26"
          font-family="sans-serif" letter-spacing="1">ERC-721</text>
  </g>

  <!-- ══ Dotted vault group box ══ -->
  <!-- Spans x=220 to x=880, y=278 to y=456 -->
  <rect x="220" y="278" width="660" height="168" rx="12"
        fill="none" stroke="rgba(56,189,248,0.25)" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="550" y="297" font-size="8" fill="rgba(56,189,248,0.35)" text-anchor="middle"
        font-family="sans-serif" letter-spacing="2">VAULT INSTANCES</text>

  <!-- Vault 1 -->
  <g transform="translate(338,365)">
    <rect x="-90" y="-55" width="180" height="110" rx="11" fill="#071a2e"
          stroke="#38bdf8" stroke-width="1.8" filter="url(#glow-blue)"/>
    <text font-size="10.5" font-weight="700" fill="#38bdf8" text-anchor="middle" y="-27"
          font-family="sans-serif">InstitutionalLoanVault</text>
    <line x1="-74" y1="-14" x2="74" y2="-14" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="8.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" y="1"
          font-family="sans-serif">per-loan ERC-4626</text>
    <text font-size="8" fill="rgba(255,255,255,0.35)" text-anchor="middle" y="16"
          font-family="sans-serif">collateral · debt · shares</text>
    <line x1="-74" y1="26" x2="74" y2="26" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="7.5" fill="#38bdf8" text-anchor="middle" y="40"
          font-family="sans-serif" letter-spacing="1">clone</text>
  </g>

  <!-- Vault 2 -->
  <g transform="translate(550,365)">
    <rect x="-90" y="-55" width="180" height="110" rx="11" fill="#071a2e"
          stroke="#38bdf8" stroke-width="1.8" filter="url(#glow-blue)"/>
    <text font-size="10.5" font-weight="700" fill="#38bdf8" text-anchor="middle" y="-27"
          font-family="sans-serif">InstitutionalLoanVault</text>
    <line x1="-74" y1="-14" x2="74" y2="-14" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="8.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" y="1"
          font-family="sans-serif">per-loan ERC-4626</text>
    <text font-size="8" fill="rgba(255,255,255,0.35)" text-anchor="middle" y="16"
          font-family="sans-serif">collateral · debt · shares</text>
    <line x1="-74" y1="26" x2="74" y2="26" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="7.5" fill="#38bdf8" text-anchor="middle" y="40"
          font-family="sans-serif" letter-spacing="1">clone</text>
  </g>

  <!-- Vault 3 (×N badge) -->
  <g transform="translate(762,365)">
    <rect x="-90" y="-55" width="180" height="110" rx="11" fill="#071a2e"
          stroke="#38bdf8" stroke-width="1.8" filter="url(#glow-blue)"/>
    <rect x="48" y="-70" width="42" height="17" rx="5" fill="#38bdf8"/>
    <text font-size="8" font-weight="700" fill="#0f1117" text-anchor="middle" x="69" y="-58"
          font-family="sans-serif">× N</text>
    <text font-size="10.5" font-weight="700" fill="#38bdf8" text-anchor="middle" y="-27"
          font-family="sans-serif">InstitutionalLoanVault</text>
    <line x1="-74" y1="-14" x2="74" y2="-14" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="8.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" y="1"
          font-family="sans-serif">per-loan ERC-4626</text>
    <text font-size="8" fill="rgba(255,255,255,0.35)" text-anchor="middle" y="16"
          font-family="sans-serif">collateral · debt · shares</text>
    <line x1="-74" y1="26" x2="74" y2="26" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text font-size="7.5" fill="#38bdf8" text-anchor="middle" y="40"
          font-family="sans-serif" letter-spacing="1">clone</text>
  </g>

  <!-- ══ ARROWS ══ -->

  <!-- Controller → vault group: straight down, center -->
  <line x1="550" y1="129" x2="550" y2="278"
        stroke="rgba(255,255,255,0.4)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="562" y="210" font-size="8.5" fill="rgba(255,255,255,0.55)" text-anchor="start"
        font-family="sans-serif">deploys clones</text>

  <!-- Controller → NFT: short horizontal right (mints NFT) -->
  <!-- gap between controller right (735) and NFT left (790) = 55px -->
  <line x1="735" y1="88" x2="790" y2="88"
        stroke="rgba(255,255,255,0.4)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="762" y="80" font-size="8.5" fill="rgba(255,255,255,0.55)" text-anchor="middle"
        font-family="sans-serif">mints NFT</text>

  <!-- LiquidationAdapter → vault group: straight down -->
  <!-- LA bottom center at (235, 123), enters box at (235, 278) — 15px from box left edge -->
  <line x1="235" y1="123" x2="235" y2="278"
        stroke="rgba(52,211,153,0.65)" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="222" y="205" font-size="8.5" fill="rgba(52,211,153,0.75)" text-anchor="end"
        font-family="sans-serif">liquidate()</text>

  <!-- NFT → vault group: straight down, gold dashed -->
  <!-- NFT bottom center at (865, 123), enters box at (865, 278) — 15px from box right edge -->
  <line x1="865" y1="123" x2="865" y2="278"
        stroke="rgba(245,158,11,0.55)" stroke-width="1.3" stroke-dasharray="5,3"
        marker-end="url(#arr-gold)"/>
  <text x="878" y="205" font-size="8.5" fill="rgba(245,158,11,0.65)" text-anchor="start"
        font-family="sans-serif">ownerOf()</text>

</svg>
