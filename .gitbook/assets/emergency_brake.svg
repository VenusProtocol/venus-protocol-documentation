<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" width="820" height="640">

  <!-- Background -->
  <rect width="820" height="640" fill="#0d1117"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- ── Venus Core Protocol ───────────────────────────────────────── -->
  <rect x="25" y="20" width="775" height="110" rx="8" fill="#161c28" stroke="#2d3748" stroke-width="1"/>
  <text x="412" y="43" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8"
        letter-spacing="0.5">Venus Core Protocol</text>

  <!-- Comptrollers -->
  <rect x="45" y="56" width="205" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="147" y="81" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Comptrollers</text>
  <text x="147" y="101" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="11" fill="#bfdbfe">(Core + IL)</text>

  <!-- vTokens -->
  <rect x="307" y="56" width="206" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="81" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">vTokens</text>

  <!-- Resilient Oracle -->
  <rect x="570" y="56" width="205" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="672" y="81" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Resilient Oracle</text>
  <text x="672" y="101" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="11" fill="#bfdbfe">(Reference Prices)</text>

  <!-- EBrake ── Comptrollers  (blue dashed, left margin) -->
  <path d="M 25 370 L 8 370 L 8 86 L 45 86"
        fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 3"
        marker-end="url(#arr-blue)"/>

  <!-- Resilient Oracle ── Deviation Sentinel  (elbow right→left) -->
  <path d="M 672 116 L 672 152 L 412 152 L 412 168"
        fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Deviation Sentinel ──────────────────────────────────────── -->
  <rect x="25" y="168" width="775" height="108" rx="8" fill="#1a2540" stroke="#334155" stroke-width="1"/>
  <text x="412" y="190" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Deviation Sentinel</text>

  <circle cx="50"  cy="210" r="3" fill="#475569"/>
  <text x="60" y="214"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Compares ResilientOracle vs SentinelOracle prices</text>

  <circle cx="50" cy="233" r="3" fill="#475569"/>
  <text x="60" y="237"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Pauses/unpauses markets and adjusts collateral factors on deviation, via EBrake</text>

  <circle cx="50" cy="256" r="3" fill="#475569"/>
  <text x="60" y="260"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Validates on-chain price data to protect against faulty monitors</text>

  <!-- DS ── EBrake (down-left) -->
  <line x1="175" y1="276" x2="175" y2="306"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DS ── Sentinel Oracle (down-right) -->
  <line x1="640" y1="276" x2="640" y2="306"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── EBrake ────────────────────────────────────────────────── -->
  <rect x="25" y="306" width="370" height="120" rx="8" fill="#1a2540" stroke="#334155" stroke-width="1"/>
  <text x="210" y="328" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">EBrake</text>

  <circle cx="46" cy="348" r="3" fill="#475569"/>
  <text x="56" y="352"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Pauses/unpauses market borrowing</text>

  <circle cx="46" cy="371" r="3" fill="#475569"/>
  <text x="56" y="375"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Adjusts collateral factors</text>

  <circle cx="46" cy="394" r="3" fill="#475569"/>
  <text x="56" y="398"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Stores pre-incident snapshots for recovery</text>

  <!-- ── Sentinel Oracle ───────────────────────────────────────── -->
  <rect x="425" y="306" width="375" height="120" rx="8" fill="#1a2540" stroke="#334155" stroke-width="1"/>
  <text x="612" y="328" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Sentinel Oracle</text>

  <circle cx="446" cy="348" r="3" fill="#475569"/>
  <text x="456" y="352"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Routes price requests to DEX oracles</text>

  <circle cx="446" cy="371" r="3" fill="#475569"/>
  <text x="456" y="375"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Supports direct price overrides</text>

  <!-- SO ── Uniswap -->
  <line x1="520" y1="426" x2="520" y2="456"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SO ── PancakeSwap -->
  <line x1="710" y1="426" x2="710" y2="456"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Uniswap Oracle ─────────────────────────────────────────── -->
  <rect x="425" y="456" width="175" height="68" rx="6" fill="#141b2b" stroke="#2d3748" stroke-width="1"/>
  <text x="512" y="483" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Uniswap Oracle</text>
  <text x="512" y="503" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#64748b">(Uniswap V3 Price)</text>

  <!-- ── PancakeSwap Oracle ─────────────────────────────────────── -->
  <rect x="625" y="456" width="175" height="68" rx="6" fill="#141b2b" stroke="#2d3748" stroke-width="1"/>
  <text x="712" y="483" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">PancakeSwap Oracle</text>
  <text x="712" y="503" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#64748b">(PancakeSwap V3 Price)</text>

  <!-- Venus Periphery footer label -->
  <text x="412" y="576" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d4f6a"
        letter-spacing="0.5">Venus Periphery</text>

</svg>
